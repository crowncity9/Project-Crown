<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Project Crown Developer Kit v0.1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="game"></canvas>
<section id="menu" class="screen">
  <div class="panel">
    <p class="studio">RRF STUDIOS</p>
    <h1>PROJECT CROWN</h1>
    <p>Welcome to Crown Point</p>
    <button id="newGameBtn">New Game</button>
    <button id="controlsBtn">Controls</button>
  </div>
</section>
<div id="hud" class="hidden">
  <h2>👑 Project Crown</h2>
  <p id="stats">Area: Apartment | Respect: 0</p>
  <p id="mission">Mission: Welcome Home — Check your phone.</p>
</div>
<section id="phone" class="phone hidden">
  <header>📱 Crown Phone</header>
  <div class="apps">
    <div><b>Messages</b><span>King Solo: Meet me at Unity Park.</span></div>
    <div><b>Map</b><span>Highland Heights</span></div>
    <div><b>Contacts</b><span>King Solo<br>Ms. Pearl<br>Marcus</span></div>
    <div><b>Status</b><span id="phoneStats">Respect: 0</span></div>
  </div>
  <button id="closePhoneBtn">Close</button>
</section>
<div id="dialogue" class="hidden"></div>
<div id="toast" class="hidden"></div>
<div id="touchControls">
  <div id="joystick"><div id="stick"></div></div>
  <div class="buttons"><button id="interactBtn">Interact</button><button id="phoneBtn">Phone</button></div>
</div>
<script src="data/world.js"></script>
<script src="game.js"></script>
</body>
</html>
